<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitAI — Workout Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="logo">FitAI 🏋️</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="workout.html" class="active">Workouts</a></li>
      <li><a href="meal.html">Meal Plan</a></li>
      <li><a href="tips.html">Tips</a></li>
      <li><a href="chatbot.html">Chat</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>WORKOUT <span>PLANNER</span></h1>
    <p>Generate a personalised workout plan based on your goal and level.</p>
  </div>

  <div class="page-content">

    <div class="form-card">
      <label>Fitness goal</label>
      <select id="w-goal">
        <option value="lose weight and burn fat">Lose weight & burn fat</option>
        <option value="build muscle and strength">Build muscle & strength</option>
        <option value="improve cardio and endurance">Improve cardio & endurance</option>
        <option value="increase flexibility and mobility">Flexibility & mobility</option>
      </select>

      <label>Fitness level</label>
      <select id="w-level">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>

      <label>Available time per session</label>
      <select id="w-time">
        <option value="20 minutes">20 minutes</option>
        <option value="30 minutes">30 minutes</option>
        <option value="45 minutes">45 minutes</option>
        <option value="1 hour">1 hour</option>
      </select>

      <label>Equipment available</label>
      <select id="w-equipment">
        <option value="no equipment (bodyweight only)">No equipment — bodyweight only</option>
        <option value="dumbbells and basic home equipment">Dumbbells & basic home gear</option>
        <option value="full gym access">Full gym access</option>
      </select>

      <button onclick="generateWorkout()">GENERATE MY WORKOUT PLAN ⚡</button>
    </div>

    <div id="workout-output" class="output-card hidden"></div>

  </div>

  <div class="chat-fab" onclick="window.location='chatbot.html'">💬</div>

  <footer>
    <p>FitAI &copy; 2025 — Built for GED 102 Final Project, Canadian University Dubai</p>
  </footer>

  <script>
    const API_KEY = 'AIzaSyCYjU00d-5UMEQ7iah9NnI7H5yvNqfg50s';

    async function generateWorkout() {
      const goal      = document.getElementById('w-goal').value;
      const level     = document.getElementById('w-level').value;
      const time      = document.getElementById('w-time').value;
      const equipment = document.getElementById('w-equipment').value;
      const output    = document.getElementById('workout-output');

      output.classList.remove('hidden');
      output.innerHTML = '<p>Building your workout plan... 💪</p>';

      const prompt = `You are an expert personal trainer. Create a detailed 5-day workout plan for someone with this profile:
- Goal: ${goal}
- Fitness level: ${level}
- Time per session: ${time}
- Equipment: ${equipment}

Format the plan clearly with:
- A heading for each day (e.g. Day 1 — Upper Body)
- List each exercise with sets, reps or duration
- Include a warm-up and cool-down for each day
- Add a rest day recommendation
- End with one strong motivational message

Keep instructions clear and beginner-friendly where relevant.`;

      try {
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${API_KEY}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }]
            })
          }
        );

        const data = await response.json();
        const text = data.candidates[0].content.parts[0].text;
        output.innerHTML = formatOutput(text);

      } catch (err) {
        output.innerHTML = '<p>Something went wrong. Check your API key and try again.</p>';
        console.error(err);
      }
    }

    function formatOutput(text) {
      return text
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
        .replace(/^# (.+)$/gm,   '<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,    '<em>$1</em>')
        .replace(/^- (.+)$/gm,   '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/\n{2,}/g, '<br><br>')
        .replace(/\n/g, '<br>');
    }
  </script>

</body>
</html>
